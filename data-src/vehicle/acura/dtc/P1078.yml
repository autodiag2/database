code: P1078
system: powertrain
subsystem: intake_manifold_runner
category: engine
definition: Intake Manifold Tuning (IMT) valve stuck in low RPM position
description: When the PCM sends an open (short runner) command, no short runner return signal is received for at least 7 seconds.
severity: medium
mil: true
created: 2026-03-11 17:00:00
updated: 2026-03-11 17:00:00

related_codes:
  - P1077
  - P2006
  - P2007

detection_conditions:
  - PCM commands IMT valve to short runner position
  - IMT position switch does not change state
  - condition persists for ≥ 7 seconds

causes:
  - intake manifold tuning valve actuator failure
  - IMT control solenoid malfunction
  - intake manifold runner mechanism jammed or carbon buildup
  - vacuum line leak or disconnected vacuum hose
  - faulty IMT position sensor
  - damaged wiring or connector in IMT control circuit
  - PCM driver fault

repairs:
  - inspect intake manifold runner linkage for binding or carbon deposits
  - test IMT actuator or vacuum diaphragm operation
  - check vacuum hoses for leaks or disconnections
  - verify IMT solenoid electrical operation
  - inspect wiring harness and connectors
  - replace faulty IMT actuator or solenoid if defective

